# ROMS-JEDI LETKF Test: WC13 Application
#

geometry:
  project_dir: Data/wc13
  roms_stdinp: roms_wc13_20040103.in
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                          # ROMS nested grid number

time window:
  begin:  &date 2004-01-03T00:00:00Z
  length: &ForecastLength PT96H

increment variables: &roms_analysis [ssh, uocn, vocn, tocn, socn]

_obs distribution: &ObsSpaceDistribution
  name: Halo
  halo size: 150.0e3

_hor obs localization: &HorizontalObsLoc
  localization method: Horizontal Gaspari-Cohn
# localization method: Heaviside
  lengthscale: 150.0e3

_conventional vertical localization: &DepthVertObsLoc
  localization method: Vertical localization
  vertical lengthscale: 150
  ioda vertical coordinate: depth
  ioda vertical coordinate group: MetaData
  localization function: Gaspari Cohn

background:
  members from template:
    template:
      date: *date
      fields_dir: Data/ensembles
      fields_filename: wc13_roms_ensemble_mem%mem%_2004-01-03-00.00.00.nc
      fields_record: 1                           # 2004-01-03T00:00:00Z
#     fields_record: 49                          # 2004-01-07T00:00:00Z
      state variables: &roms_state [ssh, uocn, vocn, tocn, socn, zocn_r]
    pattern: %mem%
    nmembers: 10
    zero padding: 3

observations:
  obs perturbations: false                       # default
  observers:

# - obs space:
#     name: InsituTemperature
#     distribution: *ObsSpaceDistribution
#     obsdatain:
#       engine:
#         type: H5File
#         obsfile: Data/wc13/obs/wc13_temp_20040103.nc4
#     obsdataout:
#       engine:
#         type: H5File
#         obsfile: Data/letkf/solver/wc13_temp_letkf.nc4
#     simulated variables: [waterTemperature]
#   obs operator:
#     name: VertInterp
#     vertical coordinate: model_level_depth_at_cell_center
#     observation vertical coordinate: depth
#     observation alias file: testinput/obsop_name_map.yaml
#   obs error:
#     covariance model: diagonal
#   obs localizations:
#   - <<: *HorizontalObsLoc
#   - <<: *DepthVertObsLoc

# - obs space:
#     name: InsituSalinity
#     distribution: *ObsSpaceDistribution
#     obsdatain:
#       engine:
#         type: H5File
#         obsfile: Data/wc13/obs/wc13_salt_20040103.nc4
#     obsdataout:
#      engine:
#         type: H5File
#         obsfile: Data/letkf/solver/wc13_salt_letkf.nc4
#     simulated variables: [salinity]
#   obs operator:
#     name: VertInterp
#     vertical coordinate: model_level_depth_at_cell_center
#     observation vertical coordinate: depth
#     observation alias file: testinput/obsop_name_map.yaml
#   obs error:
#     covariance model: diagonal
#   obs localizations:
#   - <<: *HorizontalObsLoc
#   - <<: *DepthVertObsLoc
 
  - obs space:
      name: SST 
      distribution: *ObsSpaceDistribution
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_sst_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/letkf/solver/wc13_sst_letkf.nc4
      simulated variables: [seaSurfaceTemperature]
    obs operator:
      name: Identity
      observation alias file: testinput/obsop_name_map.yaml
    obs error:
      covariance model: diagonal
    obs localizations:
    - <<: *HorizontalObsLoc

  - obs space:
      name: ADT
      distribution: *ObsSpaceDistribution
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_adt_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/letkf/solver/wc13_adt_letkf.nc4
      simulated variables: [absoluteDynamicTopography]
    obs operator:
      name: ADT
    obs error:
      covariance model: diagonal
    obs localizations:
    - <<: *HorizontalObsLoc

driver:
  do test prints: true
  do posterior observer: true
  save posterior ensemble: true
  save posterior ensemble increments: true
  save posterior mean: true
  save posterior mean increment: true
  save posterior variance: true
  save prior mean: true
  save prior variance: true

local ensemble DA:
  solver: LETKF
  inflation:
    rtps: 0.5
    rtpp: 0.6
    mult: 1.1

output:                                # posterior ensemble mean:
  single_record: true                  #   wc13_roms_letfk_mem000_DATE.nc
  data_dir: Data/letkf/solver
  prefix: wc13_roms                    # posterior ensemble: 001-010
  exp: letkf                           #   wc13_roms_letfk_mem%mem%_DATE.nc
  type: mem
  date: *date

output mean prior:                     # prior/background mean:
  single_record: true                  #   wc13_roms_letkf_mean_prior_DATE.nc
  data_dir: Data/letkf/solver
  prefix: wc13_roms
  exp: letkf
  type: mean_prior
  date: *date

output variance prior:                 # prior (Forecast) variance:
  single_record: true                  #   wc13_roms_letkf_var_prior_DATE.nc
  data_dir: Data/letkf/solver
  prefix: wc13_roms
  exp: letkf
  type: var_prior
  date: *date

output variance posterior:             # posterior (analysis) variance:
  single_record: true                  #   wc13_roms_letkf_var_posterior_DATE.nc
  data_dir: Data/letkf/solver
  prefix: wc13_roms
  exp: letkf
  type: var_posterior
  date: *date

output ensemble increments:            # posterior ensemble increments:
  single_record: true                  #   wc13_roms_letkf_inc_mem%mem_DATE.nc
  data_dir: Data/letkf/solver
  prefix: wc13_roms
  exp: letkf_inc
  type: mem
  date: *date

output increment:                      # analysys mean increment:
  single_record: true                  #   wc13_roms_letkf_inc_DATE.nc
  data_dir: Data/letkf/solver
  prefix: wc13_roms
  exp: letkf
  type: inc
  date: *date

test:
  reference filename: testref/letkf.ref
  float relative tolerance: 1.0e-3
  log output filename: testoutput/letkf.log
  test output filename: testoutput/letkf.out
