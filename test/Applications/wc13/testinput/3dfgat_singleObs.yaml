variational:
  minimizer:
    algorithm: RPCG
  iterations:                                    # each item defines an outer loop
  - ninner: 1
    gradient norm reduction: 1.0e-10
    geometry: *geom
    diagnostics:                                 # Written into output IODA files
      departures: ombg                           # OBS - H(Xb)
    online diagnostics:
      write increment: true
      increment:                                 # DA increment output file
        state component:
          add_varchange: true                    # Add fields from variable change
          single_record: true
          data_dir: Data/3dfgat/singleObs
          prefix: wc13_roms
          exp: 3dfgat
          type: inc
          date: *mid_date

final:                                           # Written into output IODA files
  diagnostics:
    departures: oman                             # saving OBS - H(Xa) in output file

output:                                          # Analysis (first guess plus increment)
  single_record: true
  data_dir: Data/3dfgat/singleObs
  prefix: wc13_roms
  exp: 3dfgat
  type: ana
  date: *mid_date

test:
  reference filename: testref/3dfgat_singleObs.ref
  float relative tolerance: 1.0
  log output filename: testoutput/3dfgat_singleObs.log
  test output filename: testoutput/3dfgat_singleObs.out
