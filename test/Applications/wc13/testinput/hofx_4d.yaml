# ROMS is configured with the JEDI driver and includes the NLM, TLM, and ADM kernels
# for the US West Coast WC13 test application.
#
# 4D Hofx  unit test for the period of Jan 3-7, 2004
#   We either use an initial state for Jan 3, 2004

geometry:
  project_dir: Data/wc13
  roms_stdinp: roms_wc13_20040103.in
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                        # ROMS nested grid number

forecast length: &ForecastLength PT96H         # 96 hours (4 days) window ending on 2004-01-07T00:00:00Z
                                               # or other smaller interval

model:
  name: ROMS
  model variables: [ssh, uocn, vocn, tocn, socn]
  tstep: PT1800S                               # WC13 has a 30 minutes timestep
  simulation length: *ForecastLength

initial condition:
  date: 2004-01-03T00:00:00Z
  fields_dir: Data/wc13/input
  fields_filename: wc13_roms_ini_20040103.nc   # initial fields for 2004-01-03T00:00:00Z
  fields_record: 1
  state variables: [ssh, uocn, vocn, tocn, socn, zocn_r]

time window:
  begin: 2004-01-03T00:00:00Z
  length: *ForecastLength

observations:
  observers:

  - obs space:
      name: InsituTS
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_TS_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/hofx/wc13_TS_hofx_4d.nc4
      simulated variables: [salinity, waterTemperature]
    obs operator:
      name: VertInterp
      vertical coordinate: model_level_depth_at_cell_center
      observation vertical coordinate: depth
      observation alias file: testinput/obsop_name_map.yaml

  - obs space:
      name: InsituTemperature
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_temp_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/hofx/wc13_temp_hofx_4d.nc4
      simulated variables: [waterTemperature]
    obs operator:
      name: VertInterp
      vertical coordinate: model_level_depth_at_cell_center
      observation vertical coordinate: depth
      observation alias file: testinput/obsop_name_map.yaml

  - obs space:
      name: InsituSalinity
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_salt_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/hofx/wc13_salt_hofx_4d.nc4
      simulated variables: [salinity]
    obs operator:
      name: VertInterp
      vertical coordinate: model_level_depth_at_cell_center
      observation vertical coordinate: depth
      observation alias file: testinput/obsop_name_map.yaml

  - obs space:
      name: SST
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_sst_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/hofx/wc13_sst_hofx_4d.nc4
      simulated variables: [seaSurfaceTemperature]
    obs operator:
      name: Identity
      observation alias file: testinput/obsop_name_map.yaml

  - obs space:
      name: SSS
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_sss_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/hofx/wc13_sss_hofx_4d.nc4
      simulated variables: [seaSurfaceSalinity]
    obs operator:
      name: Identity
      observation alias file: testinput/obsop_name_map.yaml

  - obs space:
      name: ADT
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_adt_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/hofx/wc13_adt_hofx_4d.nc4
      simulated variables: [absoluteDynamicTopography]
    obs operator:
      name: ADT

  - obs space:
      name: SurfaceUV
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_uv_sur_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/hofx/wc13_uv_sur_hofx_4d.nc4
      simulated variables: [waterSurfaceZonalVelocity,
                            waterSurfaceMeridionalVelocity]
    obs operator:
      name: Identity
      observation alias file: testinput/obsop_name_map.yaml

  - obs space:
      name: SurfaceU
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_usur_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/hofx/wc13_usur_hofx_4d.nc4
      simulated variables: [waterSurfaceZonalVelocity]
    obs operator:
      name: Identity
      observation alias file: testinput/obsop_name_map.yaml

  - obs space:
      name: SurfaceV
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_vsur_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/hofx/wc13_vsur_hofx_4d.nc4
      simulated variables: [waterSurfaceMeridionalVelocity]
    obs operator:
      name: Identity
      observation alias file: testinput/obsop_name_map.yaml

test:
  reference filename: testref/hofx_4d.ref
  float relative tolerance: 1.0e-3
  log output filename: testoutput/hofx_4d.log
  test output filename: testoutput/hofx_4d.out

# NOTES:
#
# * Check IODA ObsSpace YAML file for metadata naming conventions:
#
#   JCSDA repository: ioda/share/ioda/yaml/validation/ObsSpace.yaml
#   https://github.com/JCSDA-internal/ioda/blob/develop/share/ioda/yaml/validation/ObsSpace.yaml
#
# * The WC13 application is configured to run for 96 hours (4-days).
#   However,  it is possible to use a smaller interval for the
#   'forecast length' provided that it is an integer multiple the
#   timestep (1800 s). Then, ROMS internal parameters are changed
#   to the desired interval via the 'simulation length' property.
