# ROMS-JEDI SABER Pseudo-Diffusion Training Parameters (diffusion) Test: WC13 Application
#
# It sets correlation parameters to model the background error covariance
# using SABER diffusion operator.

geometry:
  project_dir: Data/wc13
  roms_stdinp: roms_wc13_20040103.in
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                               # ROMS nested grid number

background:
  fields_dir: Data/wc13/input
  fields_filename: wc13_roms_ini_20040103.nc   
  fields_record: 1                                    # initial fields
  date: &date 2004-01-03T00:00:00Z                    # initial fields date

  state variables: &roms_state
  - sea_surface_height_above_geoid
  - sea_water_x_velocity                              # C-grid
  - sea_water_y_velocity                              # C-grid
  - sea_water_temperature
  - sea_water_salinity

# In SABER, by default, all the length scales are defined as the half-witdh
# Gaspari-Cohn (1999) support radius, c. The relationship with the Daley (1991)
# correlation Gaussian length, L, is:  L = 2 * c * SQRT(0.3) and 
#                                      c = 0.5 * L / SQRT(0.3)
# The diffusion operator is defined in terms of L.

background error:
  covariance model: SABER
  saber central block:
    saber block name: diffusion

    active variables: &roms_analysis
    - sea_surface_height_above_geoid
    - sea_water_temperature
    - sea_water_salinity

    fields metadata:
      sea_surface_height_above_geoid:
        vert_coord: vert_coord_2d

    calibration:
      normalization:
        iterations: 30000                             # Randomization approach
      groups:
      - horizontal:                                   # Same as ROMS native DA
          as gaussian: true
          fixed value: 50.0e3
          mask: "mask_rho"
        write:
          filepath: Data/diffusion/wc13_diffusion_hcor_50
      - horizontal:
          as gaussian: true
          fixed value: 70.0e3
          mask: "mask_rho"
        write:
          filepath: Data/diffusion/wc13_diffusion_hcor_70
      - horizontal:
          as gaussian: true
          fixed value: 80.0e3
          mask: "mask_rho"
        write:
          filepath: Data/diffusion/wc13_diffusion_hcor_80
      - horizontal:
          as gaussian: true
          fixed value: 100.0e3
          mask: "mask_rho"
        write:
          filepath: Data/diffusion/wc13_diffusion_hcor_100
      - horizontal:
          as gaussian: true
          fixed value: 120.0e3
          mask: "mask_rho"
        write:
          filepath: Data/diffusion/wc13_diffusion_hcor_120
      - vertical:
          as gaussian: true
          fixed value: 5.0                            # 5 levels
          levels: 30
          mask: "mask_rho"
        write:
          filepath: Data/diffusion/wc13_diffusion_vcor_5
      - vertical:
          as gaussian: true
          fixed value: 8.0                            # 8 levels
          levels: 30
          mask: "mask_rho"
        write:
          filepath: Data/diffusion/wc13_diffusion_vcor_8
