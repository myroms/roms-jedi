# ROMS-JEDI SABER Pseudo-Diffusion Training Parameters (diffusion) Test: WC13 Application
#
# It sets correlation parameters to model the background error covariance
# using SABER diffusion operator.

geometry:
  project_dir: Data/wc13
  roms_stdinp: roms_wc13_20040103.in
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                               # ROMS nested grid number

background:
  date: &date 2004-01-03T00:00:00Z                    # initial fields date
  fields_dir: Data/wc13/input
  fields_filename: wc13_roms_ini_20040103.nc
  fields_record: 1                                    # initial fields

  state variables: &roms_state
  - sea_surface_height_above_geoid
  - eastward_sea_water_velocity                       # A-grid
  - northward_sea_water_velocity                      # A-grid
  - sea_water_x_velocity                              # C-grid
  - sea_water_y_velocity                              # C-grid
  - sea_water_temperature
  - sea_water_salinity

# In SABER, by default, all the length scales are defined as the half-witdh
# Gaspari-Cohn (1999) support radius, c/2. The relationship with the Daley (1991)
# correlation Gaussian length, L, is:  L = SQRT(0.3) * c/2   and
#                                      c = 2 * L / SQRT(0.3)
# The diffusion operator is defined in terms of L.

background error:
  covariance model: SABER
  saber central block:
    saber block name: diffusion

    active variables: &roms_analysis
    - sea_surface_height_above_geoid
    - eastward_sea_water_velocity                     # A-grid
    - northward_sea_water_velocity                    # A-grid
    - sea_water_x_velocity                            # C-grid
    - sea_water_y_velocity                            # C-grid
    - sea_water_temperature
    - sea_water_salinity

    fields metadata:
      sea_surface_height_above_geoid:
        vert_coord: vert_coord_2d

    calibration:
      normalization:
        iterations: 30000                             # Randomization approach
      groups:
      - horizontal:
          as gaussian: true
          fixed value: 60.0e+3
          mask: "mask_rho"
          model variable: sea_surface_height_above_geoid
        write:
          filepath: Data/diffusion/wc13_diffusion_ssh_hcor

      - horizontal:
          as gaussian: true
          fixed value: 60.0e+3
          mask: "mask_rho"
          model variable: eastward_sea_water_velocity
        write:
          filepath: Data/diffusion/wc13_diffusion_uvel_hcor

      - horizontal:
          as gaussian: true
          fixed value: 60.0e+3
          mask: "mask_rho"
          model variable: northward_sea_water_velocity
        write:
          filepath: Data/diffusion/wc13_diffusion_vvel_hcor

      - horizontal:
          as gaussian: true
          fixed value: 60.0e+3
          mask: "mask_rho"
          model variable: sea_water_temperature
        write:
          filepath: Data/diffusion/wc13_diffusion_temp_hcor

      - horizontal:
          as gaussian: true
          fixed value: 60.0e+3
          mask: "mask_rho"
          model variable: sea_water_salinity
        write:
          filepath: Data/diffusion/wc13_diffusion_salt_hcor

      - vertical:
          as gaussian: true
          fixed value: 2.0                            # 2 levels
          levels: 30
          method: implicit
          iterations: 4
          mask: "mask_rho"
          model variable: eastward_sea_water_velocity
        write:
          filepath: Data/diffusion/wc13_diffusion_uvel_vcor

      - vertical:
          as gaussian: true
          fixed value: 2.0                            # 2 levels
          levels: 30
          method: implicit
          iterations: 4
          mask: "mask_rho"
          model variable: northward_sea_water_velocity
        write:
          filepath: Data/diffusion/wc13_diffusion_vvel_vcor

      - vertical:
          as gaussian: true
          fixed value: 5.0                            # 5 levels
          levels: 30
          method: implicit
          iterations: 4
          mask: "mask_rho"
          model variable: sea_water_temperature
        write:
          filepath: Data/diffusion/wc13_diffusion_temp_vcor

      - vertical:
          as gaussian: true
          fixed value: 5.0                            # 5 levels
          levels: 30
          method: implicit
          iterations: 4
          mask: "mask_rho"
          model variable: sea_water_salinity
        write:
          filepath: Data/diffusion/wc13_diffusion_salt_vcor
