# ROMS-JEDI Dirac Ensemble Covariance Test: Delta Function perturbation Impulses
#
# It perturb the requested state field(s) with Dirac impulses at the
# specified (i,j,k) grid cell.

geometry:
  project_dir: Data/wc13
  roms_stdinp: roms_wc13_20040103.in
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                        # ROMS nested grid number

background:
  date: &date 2004-01-03T00:00:00Z
  fields_dir: Data/wc13/input
  fields_filename: wc13_roms_ini_20040103.nc   # initial fields for 2004-01-03T00:00:00Z
  fields_record: 1

  state variables: &roms_state
  - sea_surface_height_above_geoid
  - sea_water_x_velocity                       # C-grid
  - sea_water_y_velocity                       # C-grid
  - sea_water_temperature
  - sea_water_salinity

background error:
  covariance model: hybrid
  components:
  - covariance:
      covariance model: ensemble

      localization:
        localization method: SABER

        saber central block:
          saber block name: BUMP_NICAS

          active variables: &roms_analysis
          - sea_surface_height_above_geoid
          - sea_water_temperature
          - sea_water_salinity

          fields metadata:
            sea_surface_height_above_geoid:
              vert_coord: vert_coord_2d

          read:
            drivers:
              multivariate strategy: duplicated
              read global nicas: false
              read local nicas: true
            model:
              level for 2d variables: last
              do not cross mask boundaries: true
            nicas:
              interpolation in global file: false
            io:
              data directory: Data/bump_loc
              files prefix: wc13_bump_loc

      members from template:
        template:
          date: *date
          fields_dir: Data/ensembles
          fields_filename: wc13_roms_ensemble_mem%mem%_2004-01-03-00.00.00.nc
          fields_record: 1                     # 2004-01-03T00:00:00Z
#         fields_record: 25                    # 2004-01-05T00:00:00Z
          state variables: *roms_state
        pattern: %mem%
        nmembers: 10
        zero padding: 3
    weight:
      value: 1.0

dirac:
  ifdir:                                       # State field to perturb
  - sea_surface_height_above_geoid
  - sea_water_temperature
  - sea_water_salinity
  ixdir:                                       # field X-index impulse location
  - 25
  - 30
  - 20
  iydir:                                       # field Y-index impulse location
  - 20
  - 10
  - 40
  izdir:                                       # field Z-index impulse location
  - 1
  - 30
  - 30

output dirac:
  file_policy: PT98H                           # single output file with 49 records
  data_frequency: PT2H                         # write output data every 2 hours
  data_dir: Data/dirac
  prefix: wc13_roms
  exp: dirac_ens
  type: inc
  date: *date                                  # alias to initial date

output variance:
  file_policy: PT98H                           # single output file with 49 records
  data_frequency: PT2H                         # write output data every 2 hours
  data_dir: Data/dirac
  prefix: wc13_roms
  exp: dirac_ens
  type: var
  date: *date                                  # alias to initial date

test:
  reference filename: testref/dirac_ens_cov_nicas.ref
  float relative tolerance: 1.0e-3
  log output filename: testoutput/dirac_ens_cov_nicas.log
  test output filename: testoutput/dirac_ens_cov_nicas.out
