# ROMS-JEDI Dirac Test: Delta Function perturbation Impulses
#
# It perturb the requested state field(s) with Dirac impulses at the
# specified (i,j,k) grid cell.

geometry:
  project_dir: Data/wc13
  roms_stdinp: roms_wc13_20040103.in
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                        # ROMS nested grid number

initial condition:
  fields_dir: Data/wc13/input
  fields_filename: wc13_roms_ini_20040103.nc   # initial fields for 2004-01-03T00:00:00Z
  fields_record: 1
  state variables: &roms_analysis [ssh, uocn, vocn, tocn, socn]
  date: &date 2004-01-03T00:00:00Z

background error:
  covariance model: SABER
  saber central block:
    saber block name: BUMP_NICAS
    read:
      drivers:
        multivariate strategy: univariate
        read local nicas: true
      io:
        data directory: Data/bump
        files prefix: wc13_bump_cor
      grids:
      - model:
          variables:
          - ssh
      - model:
          variables:
          - tocn
          - socn
  saber outer blocks:                          # standard deviation impulse scaling
  - saber block name: StdDev
    read:
      model file:
        fields_dir: Data/wc13/input
        fields_filename: wc13_roms_std_i.nc    # same as ROMS native RBL4D-Var
        fields_record: 1
        state variables: *roms_analysis
        date: *date

dirac:
  ixdir: [25, 30, 20]                          # X-direction index impulse location
  iydir: [20, 10, 40]                          # Y-direction index impulse location
  izdir: [1,  30, 30]                          # Z-direction index impulse location
  ifdir: ['ssh', 'tocn', 'socn']               # State field to perturb

output dirac:
  file_policy: PT98H                           # single output file with 49 records
  data_frequency: PT2H                         # write output data every 2 hours
  data_dir: Data/dirac
  prefix: wc13_roms
  exp: dirac
  type: inc
  date: *date                                  # alias to initial date

output variance:
  file_policy: PT98H                           # single output file with 49 records
  data_frequency: PT2H                         # write output data every 2 hours
  data_dir: Data/dirac
  prefix: wc13_roms
  exp: dirac
  type: var
  date: *date                                  # alias to initial date

test:
  reference filename: testref/dirac_cov_nicas.ref
  log output filename: testoutput/dirac_cov_nicas.log
  test output filename: testoutput/dirac_cov_nicas.out

