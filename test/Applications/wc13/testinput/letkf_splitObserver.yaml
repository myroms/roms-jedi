# ROMS-JEDI LETKF Split Observer Test: WC13 Application
#

geometry:
  project_dir: Data/wc13
  roms_stdinp: roms_wc13_20040103.in
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                          # ROMS nested grid number

time window:
  begin:  &date 2004-01-03T00:00:00Z
  length: &ForecastLength PT96H

increment variables: &roms_analysis
- sea_surface_height_above_geoid
- sea_water_x_velocity                           # C-grid
- sea_water_y_velocity                           # C-grid
- sea_water_temperature
- sea_water_salinity

_obs distribution: &ObsSpaceDistribution
  name: Halo
  halo size: 150.0e3

_hor obs localization: &HorizontalObsLoc
  localization method: Horizontal Gaspari-Cohn
# localization method: Heaviside
  lengthscale: 150.0e3

_conventional vertical localization: &DepthVertObsLoc
  localization method: Vertical localization
  vertical lengthscale: 150
  ioda vertical coordinate: depth
  ioda vertical coordinate group: MetaData
  localization function: Gaspari Cohn

background:
  members from template:
    template:
      date: *date
      fields_dir: Data/ensembles
      fields_filename: wc13_roms_ensemble_mem%mem%_2004-01-03-00.00.00.nc
      fields_record: 1                           # 2004-01-03T00:00:00Z
#     fields_record: 49                          # 2004-01-07T00:00:00Z
      state variables: &roms_state
      - sea_surface_height_above_geoid
      - sea_water_x_velocity                     # C-grid
      - sea_water_y_velocity                     # C-grid
      - sea_water_temperature
      - sea_water_salinity
    pattern: %mem%
    nmembers: 10
    zero padding: 3

observations:
  obs perturbations: false                       # default
  observers:

# - obs space:
#     name: InsituTemperature
#     distribution: *ObsSpaceDistribution
#     obsdatain:
#       engine:
#         type: H5File
#         obsfile: Data/wc13/obs/wc13_temp_20040103.nc4
#     obsdataout:
#       engine:
#         type: H5File
#         obsfile: Data/letkf/splitObserver/wc13_temp_letkf.nc4
#     simulated variables: [waterTemperature]
#   obs operator:
#     name: VertInterp
#     vertical coordinate: model_level_depth_at_cell_center
#     observation vertical coordinate: depth
#     observation alias file: testinput/obsop_name_map.yaml
#   obs error:
#     covariance model: diagonal
#   obs localizations:
#   - <<: *HorizontalObsLoc
#   - <<: *DepthVertObsLoc

# - obs space:
#     name: InsituSalinity
#     distribution: *ObsSpaceDistribution
#     obsdatain:
#       engine:
#         type: H5File
#         obsfile: Data/wc13/obs/wc13_salt_20040103.nc4
#     obsdataout:
#       engine:
#         type: H5File
#     obsdataout:
#       engine:
#         type: H5File
#         obsfile: Data/letkf/splitObserver/wc13_salt_letkf.nc4
#     simulated variables: [salinity]
#   obs operator:
#     name: VertInterp
#     vertical coordinate: model_level_depth_at_cell_center
#   observation vertical coordinate: depth
#     observation alias file: testinput/obsop_name_map.yaml
#   obs error:
#     covariance model: diagonal
#   obs localizations:
#   - <<: *HorizontalObsLoc
#   - <<: *DepthVertObsLoc

  - obs space:
      name: SST
      distribution: *ObsSpaceDistribution
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_sst_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/letkf/splitObserver/wc13_sst_letkf.nc4
      simulated variables: [seaSurfaceTemperature]
    obs operator:
      name: Identity
      observation alias file: testinput/obsop_name_map.yaml
    obs error:
      covariance model: diagonal
    obs localizations:
    - <<: *HorizontalObsLoc

  - obs space:
      name: ADT
      distribution: *ObsSpaceDistribution
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_adt_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/letkf/splitObserver/wc13_adt_letkf.nc4
      simulated variables: [absoluteDynamicTopography]
    obs operator:
      name: ADT
    obs error:
      covariance model: diagonal
    obs localizations:
    - <<: *HorizontalObsLoc

driver:
  run as observer only: true
  update obs config with geometry info: false

local ensemble DA:
  solver: LETKF

output:
  single_record: true
  data_dir: Data/letkf/splitObserver
  prefix: wc13_roms
  exp: letkf
  type: mem
  date: *date

test:
  reference filename: testref/letkf_splitObserver.ref
  float relative tolerance: 1.0e-3
  log output filename: testoutput/letkf_splitObserver.log
  test output filename: testoutput/letkf_splitObserver.out
