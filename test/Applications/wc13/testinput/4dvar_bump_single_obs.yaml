# ROMS-JEDI 4D-Var Single Observation Test (BUMP-NICAS): WC13 Application
#
# It uses ROMS 4D state vector and the 4D-Var cost function for
# Strong-constraint 4D-Var, dual (default) or primal formulation.
# It computes the analysis increment for the initial state vector
# (beginning of the DA window).
#

forecast length: &ForecastLength PT96H           # 96 hours (4 days) window ending on 2004-01-07T00:00:00Z
                                                 # or other smaller interval
model timestep:  &TimeStep PT1800S               # WC13 has a 30 minutes timestep

initial date: &date 2004-01-03T00:00:00Z         # initial DA window

roms analysis:   &roms_analysis   [ssh, uocn, vocn, tocn, socn]
roms state:      &roms_state      [ssh, uocn, vocn, tocn, socn, zocn_r]
roms trajectory: &roms_trajectory [ssh, u2docn, v2docn,
                                   uocn, vocn, tocn, socn,
                                   DU_avg1, DV_avg1, DU_avg2, DV_avg2,
                                   Ktocn, Ksocn, Kvocn]

cost function:
  cost type: 4D-Var
  time window:
    begin: *date
    length: *ForecastLength
  analysis variables: *roms_analysis 

  geometry: &geom
    project_dir: Data/wc13
    roms_stdinp: roms_wc13_20040103_max.in       # 12 CPUs, 3x4 partition
#   roms_stdinp: roms_wc13_20040103.in
    fields metadata: Data/fields_metadata.yaml
    ng: 1                                        # ROMS nested grid number

  model:
    name: ROMS
    model variables: *roms_state
    simulation length: *ForecastLength
    tstep: *TimeStep

  background:
    fields_dir: Data/wc13/input
    fields_filename: wc13_roms_ini_20040103.nc   # state fields for 2004-01-03T00:00:00Z
    fields_record: 1
    state variables: *roms_state
    date: *date 

  background error:
    covariance model: SABER
    saber central block:
      saber block name: BUMP_NICAS
      active variables: &rho_vars [ssh, tocn, socn]
      fields metadata:
        ssh:
          vert_coord: vert_coord_2d
      read:
        drivers:
          multivariate strategy: univariate
          read global nicas: true
        model:
          level for 2d variables: last            
          do not cross mask boundaries: true
        nicas:
          interpolation in global file: true
        io:
          data directory: Data/bump
          files prefix: wc13_bump_cor
        grids:
        - model:
            variables:
            - ssh
        - model:
            variables:
            - tocn
            - socn
    saber outer blocks:
    - saber block name: StdDev
      read:
        model file:
          fields_dir: Data/wc13/input
          fields_filename: wc13_roms_std_i.nc    # same as ROMS native RBL4D-Var
          fields_record: 1
          state variables: *roms_analysis
          date: *date 

  observations:
    obs perturbations: false                     # default
    observers:

    - obs space:
        name: InsituTS
        obsdatain:
          engine:
            type: H5File
            obsfile: Data/wc13/obs/wc13_TS_single_obs_20040105.nc4
        obsdataout:
          engine:
            type: H5File
            obsfile: Data/4dvar/singleObs/bump/wc13_TS_4dvar_single_obs.nc4
        simulated variables: [salinity, waterTemperature]
      obs operator:
        name: VertInterp
        vertical coordinate: model_level_depth_at_cell_center
        observation vertical coordinate: depth
        observation alias file: testinput/obsop_name_map.yaml
      obs error:
        covariance model: diagonal

#    - obs space:
#        name: SST
#        obsdatain:
#          engine:
#            type: H5File
#            obsfile: Data/wc13/obs/wc13_sst_single_obs_20040105.nc4
#        obsdataout:
#          engine:
#            type: H5File
#            obsfile: Data/4dvar/singleObs/bump/wc13_sst_4dvar_single_obs.nc4
#        simulated variables: [seaSurfaceTemperature]
#      obs operator:
#        name: Identity
#        observation alias file: testinput/obsop_name_map.yaml
#      obs error:
#        covariance model: diagonal

#    - obs space:
#        name: ADT
#        obsdatain:
#          engine:
#            type: H5File
#            obsfile: Data/wc13/obs/wc13_adt_single_obs_20040105.nc4
#        obsdataout:
#          engine:
#            type: H5File
#            obsfile: Data/4dvar/singleObs/bump/wc13_adt_4dvar_single_obs.nc4
#        simulated variables: [absoluteDynamicTopography]
#      obs operator:
#        name: ADT
#      obs error:
#        covariance model: diagonal

variational:
  minimizer:
#   algorithm: DRPCG                             # Primal formulation
#   algorithm: DRPLanczos                        # Primal formulation
    algorithm: RPCG                              # Dual   formulation
#   algorithm: RPLanczos                         # Dual   formulation
  iterations:
  - ninner: 1                                    # each item defined an outer loop
    gradient norm reduction: 1E-10
    test: on
    online diagnostics:
      adj obs test: false
      adj tlm test: false
      online adj test: false
      tlm approx test: false
      tlm propag test: false
      tlm taylor test: false
    geometry: *geom
    linear model:
      name: LMROMS
      date: *date
      simulation length: *ForecastLength
      lm variables: *roms_analysis
      tstep: PT1800S                             # WC13 has a 30 minutes TLM/ADM timestep
      trajectory:
        model variables: *roms_trajectory
        tstep: PT1800S
      variable change: Identity
    diagnostics:                                 # Written into output IODA files
      departures: ombg                           # OBS - H(Xb)
    online diagnostics:
      write increment: true
      increment:                                 # DA increment output file
        state component:
          single_record: true
          data_dir: Data/4dvar/singleObs/bump
          prefix: wc13_roms
          exp: 4dvar
          type: inc
          date: *date

final:                                           # Written into output IODA files
  diagnostics:
    departures: oman                             # saving OBS - H(Xa) in output file

output:                                          # Forecast from Analysis
  firt: PT0S
  frequency: &frequency PT2H                     # write output data every 2 hours
  file_policy: PT98H                             # single output file with 49 records
  data_frequency: *frequency
  data_dir: Data/4dvar/singleObs/bump
  prefix: wc13_roms
  exp: 4dvar
  type: ana
  date: *date

test:
  reference filename: testref/4dvar_bump_single_obs.ref
  float relative tolerance: 1.0
  log output filename: testoutput/4dvar_bump_single_obs.log
  test output filename: testoutput/4dvar_bump_single_obs.out
