# ROMS-JEDI Dirac Pseudo-Diffusion Test: Delta Function perturbation Impulses
#
# It perturb the requested state field(s) with Dirac impulses at the
# specified (i,j,k) grid cell using the pseudo-diffusion operator

geometry:
  project_dir: Data/wc13
  roms_stdinp: roms_wc13_20040103.in
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                          # ROMS nested grid number
  vertical coordinate: depths                    # ATLAS FunctionSpace default
# vertical coordinate: levels                    # ATLAS FunctionSpace levels

background:
  fields_dir: Data/wc13/input
  fields_filename: wc13_roms_ini_20040103.nc   # initial fields for 2004-01-03T00:00:00Z
  fields_record: 1
  state variables: &roms_analysis [ssh, tocn, socn]
  date: &date 2004-01-03T00:00:00Z

background error:
  covariance model: SABER
  adjoint test: true
  saber central block:
    saber block name: diffusion
    read:
      groups:
      - variables: [tocn, socn]
        multivariate strategy: univariate
        horizontal:
#         filepath: Data/diffusion/wc13_diffusion_hcor_50
#         filepath: Data/diffusion/wc13_diffusion_hcor_70
          filepath: Data/diffusion/wc13_diffusion_hcor_80
#         filepath: Data/diffusion/wc13_diffusion_hcor_100
#         filepath: Data/diffusion/wc13_diffusion_hcor_120
        vertical:
          levels: 30
#         filepath: Data/diffusion/wc13_diffusion_vcor_5
          filepath: Data/diffusion/wc13_diffusion_vcor_8
      - variables: [ssh]
        horizontal:
#         filepath: Data/diffusion/wc13_diffusion_hcor_50
#         filepath: Data/diffusion/wc13_diffusion_hcor_70
          filepath: Data/diffusion/wc13_diffusion_hcor_80
#         filepath: Data/diffusion/wc13_diffusion_hcor_100
#         filepath: Data/diffusion/wc13_diffusion_hcor_120

dirac:
  ixdir: [25, 30, 20]                          # X-direction index impulse location
  iydir: [20, 10, 40]                          # Y-direction index impulse location
  izdir: [1,  30, 30]                          # Z-direction index impulse location
  ifdir: ['ssh', 'tocn', 'socn']               # State field to perturb

output dirac:
  single_record: true
  data_dir: Data/dirac
  prefix: wc13_roms
  exp: dirac_diffusion
  type: inc
  date: *date                                  # alias to initial date

output variance:
  single_record: true
  data_dir: Data/dirac
  prefix: wc13_roms
  exp: dirac_diffusion
  type: var
  date: *date                                  # alias to initial date

test:
  reference filename: testref/dirac_diffusion.ref
  log output filename: testoutput/dirac_diffusion.log
  test output filename: testoutput/dirac_diffusion.out

