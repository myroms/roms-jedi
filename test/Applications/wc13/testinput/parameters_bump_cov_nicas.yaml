# ROMS is configured with the JEDI driver and includes the NLM, TLM, and ADM kernels
# for the US West Coast WC13 test application.
#
# Computes and writes Error Coveriance homogeneous spatial correlation parameters for
# BUMP.

geometry:
  project_dir: Data/wc13
  roms_stdinp: roms_wc13_20040103.in
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                           # ROMS nested grid number

background:
  fields_dir: Data/wc13/input
  fields_filename: wc13_roms_ini_20040103.nc   
  fields_record: 1                                # initial fields
  state variables: [ssh, tocn, socn]
  date: &date 2004-01-03T00:00:00Z                # initial fields date

# In SABER, by default, all the length scales are defined as the Gaspari-Cohn (1999)
# support radius, c. The relationship with the Daley (1991) correlation Gaussian
# length, L, is:    L = c * SQRT(0.3)   or   c = L / SQRT(0.3)

background error:
  covariance model: SABER
  saber central block:
    saber block name: BUMP_NICAS
    active variables: &rho_vars [ssh, tocn, socn]
    calibration:
      io:
        data directory: Data/bump                     # BUMP data directory
        files prefix: wc13_bump_cov
      drivers:
        multivariate strategy: univariate             # NICAS multivariate strategy
        compute nicas: true                           # Run NICAS driver
        write local nicas: true
        write global nicas: true
      model:
        do not cross mask boundaries: true
        level for 2d variables: last
      nicas:
#       resolution: 6.0                               # NICAS subgrid resolution
        resolution: 20.0                              # NICAS subgrid resolution (smoother)
        explicit length-scales: true
        horizontal length-scale:
        - groups:
          - ssh
          value: 91287.0                              # L = 50e3 m
        - groups:
          - tocn
          value: 91287.0                              # L = 50e3 m
        - groups:
          - socn
          value: 91287.0                              # L = 50e3 m
        vertical length-scale:
        - groups:
          - tocn
          value: 54.77                                # L = 30 m
        - groups:
          - socn
          value: 54.77                                # L = 30 m
      grids:
      - model:
          variables:
          - ssh
      - model:
          variables:
          - tocn
          - socn

      output model files:                                    # Write horizontal correlations NetCDF file
      - parameter: cor_rh
        file:
          single_record: true
          data_dir: Data/bump
          prefix: wc13
          exp: bump
          type: cov_rh
          date: *date
      - parameter: cor_rv                                    # Write vertical correlations NetCDF file
        file:
          single_record: true
          data_dir: Data/bump
          prefix: wc13
          exp: bump
          type: cov_rv
          date: *date

test:
  reference filename: testref/parameters_bump_cov_nicas.ref
  float relative tolerance: 1.0e-3
  log output filename: testoutput/parameters_bump_cov_nicas.log
  test output filename: testoutput/parameters_bump_cov_nicas.out
