# ROMS-JEDI 4D-Var Single Observation Test (BUMP-NICAS): WC13 Application
#
# It uses ROMS 4D state vector and the 4D-Var cost function for
# Strong-constraint 4D-Var, dual (default) or primal formulation.
# It computes the analysis increment for the initial state vector
# (beginning of the DA window).
#

forecast length: &ForecastLength PT96H           # 96 hours (4 days) window ending on 2004-01-07T00:00:00Z
                                                 # or other smaller interval
model timestep:  &TimeStep PT1800S               # WC13 has a 30 minutes timestep

initial date: &date 2004-01-03T00:00:00Z         # initial DA window

roms analysis: &roms_analysis
- sea_surface_height_above_geoid
- eastward_sea_water_velocity                    # A-grid
- northward_sea_water_velocity                   # A-grid
- sea_water_temperature
- sea_water_salinity

roms state: &roms_state
- sea_surface_height_above_geoid
- eastward_sea_water_velocity                    # A-grid
- northward_sea_water_velocity                   # A-grid
- sea_water_x_velocity                           # C-grid
- sea_water_y_velocity                           # C-grid
- sea_water_temperature
- sea_water_salinity
- model_level_depth_at_cell_center
- barotropic_sea_water_x_velocity
- barotropic_sea_water_y_velocity
- sea_water_time_average_of_barotropic_x_velocity_flux
- sea_water_time_average_of_barotropic_y_velocity_flux
- sea_water_correct_barotropic_x_velocity_flux_for_coupling
- sea_water_correct_barotropic_y_velocity_flux_for_coupling
- vertical_viscosity_coefficient_of_sea_water
- vertical_diffusion_coefficient_of_temperature_in_sea_water
- vertical_diffusion_coefficient_of_salinity_in_sea_water

cost function:
  cost type: 4D-Var
  time window:
    begin: *date
    length: *ForecastLength
  analysis variables: *roms_analysis

  geometry: &geom
    project_dir: Data/wc13
#   roms_stdinp: roms_wc13_20040103_debug.in
    roms_stdinp: roms_wc13_20040103_max.in       # 12 CPUs, 3x4 partition
    fields metadata: Data/fields_metadata.yaml
    ng: 1                                        # ROMS nested grid number

  model:
    name: NLROMS
    model variables: *roms_state
    simulation length: *ForecastLength
    tstep: *TimeStep

  background:
    fields_dir: Data/wc13/input
    fields_filename: wc13_roms_ini_20040103.nc   # state fields for 2004-01-03T00:00:00Z
    fields_record: 1
    state variables: *roms_state
    date: *date

  background error:
    covariance model: SABER
    saber central block:
      saber block name: BUMP_NICAS
      active variables: *roms_analysis
      fields metadata:
        sea_surface_height_above_geoid:
          vert_coord: vert_coord_2d
      read:
        drivers:
          multivariate strategy: univariate
          read global nicas: false
          read local nicas: true
        model:
          level for 2d variables: last
          do not cross mask boundaries: true
        nicas:
          interpolation in global file: false
        io:
          data directory: Data/bump
          files prefix: wc13_bump_cor_max
        grids:
        - model:
            variables:
            - sea_surface_height_above_geoid
        - model:
            variables:
            - eastward_sea_water_velocity
            - northward_sea_water_velocity
            - sea_water_temperature
            - sea_water_salinity

    saber outer blocks:
    - saber block name: StdDev
      read:
        model file:
          fields_dir: Data/wc13/input
          fields_filename: wc13_roms_std_i.nc
          fields_record: 1
          state variables: *roms_analysis
          date: *date

  observations:
    obs perturbations: false                     # default
    observers:

    - obs space:
        name: InsituTS
        obsdatain:
          engine:
            type: H5File
            obsfile: Data/wc13/obs/wc13_TS_single_obs_20040105.nc4
        obsdataout:
          engine:
            type: H5File
            obsfile: Data/4dvar/singleObs/bump/wc13_TS_4dvar.nc4
        simulated variables: [salinity, waterTemperature]
      obs operator:
        name: VertInterp
        vertical coordinate: model_level_depth_at_cell_center
        observation vertical coordinate: depth
        observation alias file: Data/obsop_name_map.yaml
      obs error:
        covariance model: diagonal

#    - obs space:
#        name: SST
#        obsdatain:
#          engine:
#            type: H5File
#            obsfile: Data/wc13/obs/wc13_sst_single_obs_20040105.nc4
#        obsdataout:
#          engine:
#            type: H5File
#            obsfile: Data/4dvar/singleObs/bump/wc13_sst_4dvar.nc4
#        simulated variables: [seaSurfaceTemperature]
#      obs operator:
#        name: Identity
#        observation alias file: Data/obsop_name_map.yaml
#      obs error:
#        covariance model: diagonal

#    - obs space:
#        name: ADT
#        obsdatain:
#          engine:
#            type: H5File
#            obsfile: Data/wc13/obs/wc13_adt_single_obs_20040105.nc4
#        obsdataout:
#          engine:
#            type: H5File
#            obsfile: Data/4dvar/singleObs/bump/wc13_adt_4dvar.nc4
#        simulated variables: [absoluteDynamicTopography]
#      obs operator:
