# ROMS-JEDI Nonlinear Model Forecast Unit Test: WC13 Application

geometry:
  project_dir: Data/wc13
  roms_stdinp: roms_wc13_20040103_max.in       # 12 CPUs, 3x4 partition
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                        # ROMS nested grid number

forecast length: &ForecastLength PT96H         # 96 hours (4 days) window ending on 2004-01-07T00:00:00Z
#forecast length: &ForecastLength PT6H         # 6 hours window ending on 2004-01-07T00:00:00Z
                                               # or other smaller interval

model:
  name: NLROMS
  tstep: PT1800S                               # WC13 has a 30 minutes timestep
# tstep: PT6H                                  # WC13 has a 30 minutes timestep
  simulation length: *ForecastLength

  model variables:
  - sea_surface_height_above_geoid
  - eastward_sea_water_velocity                # A-grid
  - northward_sea_water_velocity               # A-grid
  - sea_water_x_velocity                       # C-grid
  - sea_water_y_velocity                       # C-grid
  - sea_water_temperature
  - sea_water_salinity

initial condition:
  date: &initial_date 2004-01-03T00:00:00Z
  fields_dir: Data/wc13/input
  fields_filename: wc13_roms_ini_20040103.nc   # initial fields for 2004-01-03T00:00:00Z
  fields_record: 1

  state variables:
  - sea_surface_height_above_geoid
  - eastward_sea_water_velocity                # A-grid
  - northward_sea_water_velocity               # A-grid
  - sea_water_x_velocity                       # C-grid
  - sea_water_y_velocity                       # C-grid
  - sea_water_temperature
  - sea_water_salinity
  - barotropic_sea_water_x_velocity
  - barotropic_sea_water_y_velocity
  - sea_water_time_average_of_barotropic_x_velocity_flux
  - sea_water_time_average_of_barotropic_y_velocity_flux
  - sea_water_correct_barotropic_x_velocity_flux_for_coupling
  - sea_water_correct_barotropic_y_velocity_flux_for_coupling
  - vertical_viscosity_coefficient_of_sea_water
  - vertical_diffusion_coefficient_of_temperature_in_sea_water
  - vertical_diffusion_coefficient_of_salinity_in_sea_water

output:
  file_policy: PT98H                           # single output file with 49 records (see NOTES)
  frequency: &frequency PT2H                   # write output data every 2 hours
# frequency: &frequency PT1800S                # write output data every 2 hours
  data_frequency: *frequency
  data_dir: Data/forecast
  prefix: wc13_roms
  exp: nlm
  type: fct
  date: *initial_date                          # alias to initial date
  forecast length: *ForecastLength             # alias to forecast length

test:
  reference filename: testref/forecast_roms.ref
  float relative tolerance: 1.0e-3
  log output filename: testoutput/forecast_roms.log
  test output filename: testoutput/forecast_roms.out
