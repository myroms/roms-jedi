# ROMS-JEDI 3D-Var Zero Observations Test: WC13 Application
#
# It uses ROMS 3D state vector and the 3D-Var cost function. It computes
# the analysis increment for the initial state vector (beginning of the
# DA window).
#
# No observations are available to assimilate. Notice the single observation
# provided is filtered with a "Bounds Check" with and unphysical "minvalue".
# As a result, the observation(s) are rejected.


forecast length: &ForecastLength PT96H           # 96 hours (4 days) window ending on 2004-01-07T00:00:00Z
                                                 # or other smaller interval
model timestep:  &TimeStep PT1800S               # WC13 has a 30 minutes timestep

initial date: &date 2004-01-03T00:00:00Z         # initial DA window
middle date:  &mid_date 2004-01-05T00:00:00Z     # middle  DA window

roms analysis: &roms_analysis
- sea_surface_height_above_geoid
- eastward_sea_water_velocity                    # A-grid
- northward_sea_water_velocity                   # A-grid
- sea_water_temperature
- sea_water_salinity

roms state: &roms_state
- sea_surface_height_above_geoid
- eastward_sea_water_velocity                    # A-grid
- northward_sea_water_velocity                   # A-grid
- sea_water_x_velocity                           # C-grid
- sea_water_y_velocity                           # C-grid
- sea_water_temperature
- sea_water_salinity
- model_level_depth_at_cell_center

cost function:
  cost type: 3D-Var
  time window:
    begin: *date
    length: *ForecastLength
  analysis variables: *roms_analysis

  geometry: &geom
    project_dir: Data/wc13
    roms_stdinp: roms_wc13_20040103.in
    fields metadata: Data/fields_metadata.yaml
    ng: 1                                        # ROMS nested grid number

  model:
    name: ROMS
    model variables: *roms_state
    simulation length: *ForecastLength
    tstep: *TimeStep

  background:
    fields_dir: Data/wc13/input
    fields_filename: wc13_roms_ini_20040105.nc   # initial fields for 2004-01-05T00:00:00Z
    fields_record: 1
    state variables: *roms_state
    date: *mid_date                              # middle DA window

  background error:
    covariance model: SABER
    saber central block:
      saber block name: BUMP_NICAS
      active variables: *roms_analysis
      fields metadata:
        sea_surface_height_above_geoid:
          vert_coord: vert_coord_2d
      read:
        drivers:
          multivariate strategy: univariate
          read global nicas: false
          read local nicas: true
        model:
          level for 2d variables: last
          do not cross mask boundaries: true
        nicas:
          interpolation in global file: false
        io:
          data directory: Data/bump
          files prefix: wc13_bump_cor
        grids:
        - model:
            variables:
            - sea_surface_height_above_geoid
        - model:
            variables:
            - eastward_sea_water_velocity
            - northward_sea_water_velocity
            - sea_water_temperature
            - sea_water_salinity

    saber outer blocks:
    - saber block name: StdDev
      read:
        model file:
          fields_dir: Data/wc13/input
          fields_filename: wc13_roms_std_i.nc
          fields_record: 1
          state variables: *roms_analysis
          date: *mid_date

  observations:
    obs perturbations: false                     # default
    observers:

    - obs space:
        name: SST
        obsdatain:
          engine:
            type: H5File
            obsfile: Data/wc13/obs/wc13_sst_single_obs_20040105.nc4
        obsdataout:
          engine:
            type: H5File
            obsfile: Data/3dvar/zeroObs/wc13_sst_3dvar.nc4
        simulated variables: [seaSurfaceTemperature]
      obs operator:
        name: Identity
        observation alias file: testinput/obsop_name_map.yaml
      obs error:
        covariance model: diagonal
      obs filters:
      - filter: Bounds Check
        filter variables:
        - name: seaSurfaceTemperature
        minvalue: 500.0                          # filter out all SST observations

#   - obs space:
#       name: ADT
#       obsdatain:
#         engine:
#           type: H5File
#           obsfile: Data/wc13/obs/wc13_adt_single_obs_20040105.nc4
#       obsdataout:
#         engine:
#           type: H5File
#           obsfile: Data/3dvar/zeroObs/wc13_adt_3dvar.nc4
#       simulated variables: [absoluteDynamicTopography]
#     obs operator:
#       name: ADT
#     obs error:
#       covariance model: diagonal
#     obs filters:
#     - filter: Bounds Check
#       filter variables:
#       - name: absoluteDynamicTopography
#       minvalue: 50.0                           # filter out all ADT observations

variational:
  minimizer:
    algorithm: RPCG
  iterations:                                    # each item defines an outer loop
  - geometry: *geom
    ninner: 1
    gradient norm reduction: 1E-10
    test: on
    diagnostics:                                 # Written into output IODA files
      departures: ombg                           # OBS - H(Xb)
    online diagnostics:
      write increment: true
      increment:                                 # DA increment output file
        state component:
          add_varchange: true                    # Add fields from variable change
          single_record: true
          data_dir: Data/3dvar/zeroObs
          prefix: wc13_roms
          exp: 3dvar
          type: inc
          date: *mid_date

final:                                           # Written into output IODA files
  diagnostics:
    departures: oman                             # saving OBS - H(Xa) in output file

output:
  file_policy: PT98H                             # single output file with 49 records
  frequency: &frequency PT2H                     # write output data every 2 hours
  data_frequency: *frequency
  data_dir: Data/3dvar/zeroObs
  prefix: wc13_roms
  exp: 3dvar
  type: zero_obs
  date: *mid_date

test:
  reference filename: testref/3dvar_zeroObs.ref
  float relative tolerance: 1.0e-3
  log output filename: testoutput/3dvar_zeroObs.log
  test output filename: testoutput/3dvar_zeroObs.out
