# ROMS-JEDI Recentered Ensemble Test: WC13 Application
#
# Recenters ensemble around central state.

geometry:
  project_dir: Data/wc13
  roms_stdinp: roms_wc13_20040103.in
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                        # ROMS nested grid number

recenter variables: &roms_state
- sea_surface_height_above_geoid
- eastward_sea_water_velocity                  # A-grid
- northward_sea_water_velocity                 # A-grid
- sea_water_x_velocity                         # C-grid
- sea_water_y_velocity                         # C-grid
- sea_water_temperature
- sea_water_salinity

center:                                        # Central state
  date: &date 2004-01-03T00:00:00Z
  fields_dir: Data/wc13/input
  fields_filename: wc13_roms_ini_20040103.nc   # initial fields for 2004-01-03T00:00:00Z
  fields_record: 1
  state variables: *roms_state

zero center: false

ensemble:                                      # Ensembles to be recentered
  members from template:
    template:
      date: *date
      fields_dir: Data/ensembles
      fields_filename: wc13_roms_ensemble_mem%mem%_2004-01-03-00.00.00.nc
      fields_record: 1                         # 2004-01-03T00:00:00Z
      state variables: *roms_state
    pattern: %mem%
    nmembers: 10
    zero padding: 3

ensemble meanoutput:
  single_record: true
  data_dir: Data/ensembles
  prefix: wc13_roms
  exp: ensemble
  type: mean
  date: *date

recentered output:
  single_record: true
  data_dir: Data/ensembles
  prefix: wc13_roms
  exp: ensemble
  type: recentered
  date: *date

test:
  reference filename: testref/ens_recenter.ref
  float relative tolerance: 1.0e-3
  log output filename: testoutput/ens_recenter.log
  test output filename: testoutput/ens_recenter.out