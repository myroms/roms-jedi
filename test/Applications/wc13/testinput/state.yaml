# ROMS is configured with the JEDI driver and includes the NLM, TLM, and ADM kernels
# for the US West Coast WC13 test application.

geometry:
  project_dir: Data/wc13
  roms_stdinp: roms_wc13_20040103.in
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                        # ROMS nested grid number

state test:
  date: &date 2004-01-03T00:00:00Z

  statefile:                                   # Reads an existing state NetCDF file
    fields_dir: Data/wc13/input
    fields_filename: wc13_roms_ini_20040103.nc
    fields_record: 1
    date: *date
    state variables: &roms_state [ssh, uocn, vocn, tocn, socn]

  state generate:                              # Generates an analytical state
    analytic init:
      method: 'ana_ocnfields'
      T0: 25.0                                 # background temperature (C)
      S0: 32.5                                 # background salinity
      U0: 1.2                                  # background U-velocity (m/s)
      V0: 0.7                                  # background V-velocity (m/s)
    date: *date
    state variables: *roms_state

  construct to variables: *roms_state

  norm file: 8609.0895530693979
  norm generated state: 9463.4685549140231
  tolerance: 1.0e-12

# NOTES:
#
# * The entry "statefileout" was renamed to "statefileout2" because it failed.
#   See PR 24: https://github.com/JCSDA-internal/roms-jedi/pull/24
#   
