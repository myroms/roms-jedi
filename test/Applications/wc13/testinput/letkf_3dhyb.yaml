# ROMS-JEDI LETKF-Mean/Hybrid 3DEnVar FGAT (Dual Formulation) Test: WC13 Application
#
# It uses the analysis mean from LETKF as the background for
# Hybrid 3DEnVar, and the LETKF analysis ensemble for the ensemble
# error covariance modeling.
# Reference: Penny, S.G, MWR, 142: 2139-2149 (2014).
#
# It uses ROMS 3D state vector and the 4D-Var cost function for a
# 3D-FGAT (First Guess at Appropriate Time) by approximating the
# Tangent Linear and Adjoint models with the Identity operator.
# It computes the analysis increment for the initial state vector
# (beginning of the DA window).
#
# Using RPCG (Augmented Restricted Preconditioned Conjugate Gradient)
# Minimizer, Gratton and Tshimanga, QJRMS, 135: 1573-1585 (2009).

forecast length: &ForecastLength PT96H             # 96 hours (4 days) window ending on 2004-01-07T00:00:00Z
                                                   # or other smaller interval
model timestep:  &TimeStep PT1800S                 # WC13 has a 30 minutes timestep

initial date: &date 2004-01-03T00:00:00Z           # initial DA window

roms analysis:  &roms_analysis [ssh, uocn, vocn, tocn, socn]
roms state:     &roms_state    [ssh, uocn, vocn, tocn, socn, zocn_r]

cost function:
  cost type: 4D-Var
  time window:
    begin: *date
    length: *ForecastLength
  analysis variables: *roms_analysis 

  geometry: &geom
    project_dir: Data/wc13
    roms_stdinp: roms_wc13_20040103.in
    fields metadata: Data/fields_metadata.yaml
    ng: 1                                          # ROMS nested grid number

  model:
    name: ROMS
    model variables: *roms_state
    simulation length: *ForecastLength
    tstep: *TimeStep

  background:                                      # LETKF analysis mean
    fields_dir: Data/letkf/solver
    fields_filename: wc13_roms_letkf_mem000_2004-01-03-00.00.00.nc
    fields_record: 1
    state variables: *roms_state
    date: *date 

  background error:
    covariance model: hybrid
    components:
    - covariance:                                  # Static error covariance
        covariance model: SABER
        saber central block:
          saber block name: BUMP_NICAS
          active variables: &rho_vars [ssh, tocn, socn]
          fields metadata:
            ssh:
              vert_coord: vert_coord_2d
          read:
            drivers:
              multivariate strategy: univariate
              read global nicas: false
              read local nicas: true
            model:
              level for 2d variables: last            
              do not cross mask boundaries: true
            nicas:
              interpolation in global file: false
            io:
              data directory: Data/bump
              files prefix: wc13_bump_cor
            grids:
            - model:
                variables:
                - ssh
            - model:
                variables:
                 - tocn
                 - socn
        saber outer blocks:
        - saber block name: StdDev
          read:
            model file:
              fields_dir: Data/wc13/input
              fields_filename: wc13_roms_std_i.nc  # same as ROMS native RBL4D-Var
              fields_record: 1
              state variables: *roms_analysis
              date: *date
      weight:                                      # Static B weight
        value: 0.4
    - covariance:
        covariance model: ensemble                 # Ensemble error covariance
        localization:
          localization method: SABER
          saber central block:
            saber block name: BUMP_NICAS
            active variables: *rho_vars
            fields metadata:
              ssh:
                vert_coord: vert_coord_2d
            read:
              drivers:
                multivariate strategy: duplicated
                read global nicas: false
                read local nicas: true
              model:
                level for 2d variables: last            
                do not cross mask boundaries: true
              nicas:
                interpolation in global file: false
              io:
                data directory: Data/bump_loc
                files prefix: wc13_bump_loc
        members from template:
          template:
            date: *date
            fields_dir: Data/ensembles
            fields_filename: wc13_roms_ensemble_mem%mem%_2004-01-03-00.00.00.nc
#           fields_dir: Data/letkf/solver
#           fields_filename: wc13_roms_letkf_mem%mem%_2004-01-03-00.00.00.nc
            fields_record: 1                       # 2004-01-03T00:00:00Z
            state variables: *roms_state
          pattern: %mem%
          nmembers: 10
          zero padding: 3
      weight:                                      # Ensemble B weight
        value: 0.6

  observations:
    obs perturbations: false                     # default
    observers:

    - obs space:
        name: InsituTemperature
        obsdatain:
          engine:
            type: H5File
            obsfile: Data/wc13/obs/wc13_temp_20040103.nc4
        obsdataout:
          engine:
            type: H5File
            obsfile: Data/letkf/3dhyb/wc13_temp_letkf_3dhyb.nc4
        simulated variables: [waterTemperature]
      obs operator:
        name: VertInterp
        vertical coordinate: model_level_depth_at_cell_center
        observation vertical coordinate: depth
        observation alias file: testinput/obsop_name_map.yaml
      obs error:
        covariance model: diagonal
 
    - obs space:
        name: InsituSalinity
        obsdatain:
          engine:
            type: H5File
            obsfile: Data/wc13/obs/wc13_salt_20040103.nc4
        obsdataout:
         engine:
            type: H5File
            obsfile: Data/letkf/3dhyb/wc13_salt_letkf_3dhyb.nc4
        simulated variables: [salinity]
      obs operator:
        name: VertInterp
        vertical coordinate: model_level_depth_at_cell_center
        observation vertical coordinate: depth
        observation alias file: testinput/obsop_name_map.yaml
      obs error:
        covariance model: diagonal
 
    - obs space:
        name: SST
        obsdatain:
          engine:
            type: H5File
            obsfile: Data/wc13/obs/wc13_sst_20040103.nc4
        obsdataout:
          engine:
            type: H5File
            obsfile: Data/letkf/3dhyb/wc13_sst_letkf_3dhyb.nc4
        simulated variables: [seaSurfaceTemperature]
      obs operator:
        name: Identity
        observation alias file: testinput/obsop_name_map.yaml
      obs error:
        covariance model: diagonal

    - obs space:
        name: ADT
        obsdatain:
          engine:
            type: H5File
            obsfile: Data/wc13/obs/wc13_adt_20040103.nc4
        obsdataout:
          engine:
            type: H5File
            obsfile: Data/letkf/3dhyb/wc13_adt_letkf_3dhyb.nc4
        simulated variables: [absoluteDynamicTopography]
      obs operator:
        name: ADT
      obs error:
        covariance model: diagonal

variational:
  minimizer:
    algorithm: RPCG                                # Dual Formulation
  iterations:                                      # each item defines an outer loop
  - geometry: *geom
    linear model:
      name: Identity                               # Identity TLM/ADM
      increment variables: *roms_analysis
      tstep: *TimeStep
    ninner: 10
    gradient norm reduction: 1E-10
    test: on
    diagnostics:                                   # Written into output IODA files
      departures: ombg                             # OBS - H(Xb)
    online diagnostics:
      write increment: true
      increment:                                   # DA increment output file
        state component:
          single_record: true
          data_dir: Data/letkf/3dhyb
          prefix: wc13_roms
          exp: 3dhyb
          type: inc
          date: *date

final:                                             # Written into output IODA files
  diagnostics:
    departures: oman                               # saving OBS - H(Xa) in output file

output:
  file_policy: PT98H                               # single output file with 49 records
  frequency: &frequency PT2H                       # write output data every 2 hours
  data_frequency: *frequency
  data_dir: Data/letkf/3dhyb
  prefix: wc13_roms
  exp: letfg_3dhyb
  type: nlm
  date: *date

test:
  reference filename: testref/letkf_3dhyb.ref
  float relative tolerance: 1.0e-3
  log output filename: testoutput/letkf_3dhyb.log
  test output filename: testoutput/letkf_3dhyb.out
