# ROMS-JEDI 3D HofX Unit Test: WC13 Application
#
# 3D Hofx unit test for the period of Jan 3-7, 2004
#   We either use an initial state for Jan 3, 2004 or
#   the nonlinear model (NLM) trajectory for Jan 3-7, 2004 with fields every two hours

geometry:
  project_dir: Data/wc13
  roms_stdinp: roms_wc13_20040103.in
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                        # ROMS nested grid number

state:
  date: 2004-01-05T00:00:00Z
  fields_dir: Data/wc13/input
  fields_filename: wc13_roms_ini_20040103.nc   # initial fields for 2004-01-03T00:00:00Z
  fields_record: 1                             # assign middle window time of 2004-01-05T00:00:00Z
# fields_filename: wc13_NLtrajectory_sp.nc     # single precision NLM trajectory (2 hours snapshots)
# fields_filename: wc13_NLtrajectory_dp.nc     # double precision NLM trajectory (2 hours snapshots)
# fields_record: 26                            # record for middle of time window on 2004-01-05T00:00:00Z

  state variables:
  - sea_surface_height_above_geoid
  - eastward_sea_water_velocity                                  # A-grid
  - northward_sea_water_velocity                                 # A-grid
  - sea_water_x_velocity                                         # C-grid
  - sea_water_y_velocity                                         # C-grid
  - sea_water_temperature
  - sea_water_salinity
  - unvarying_model_level_depth_at_cell_center

time window:
  begin: 2004-01-03T00:00:00Z
  length: P4D                                  # 4-day window ending on 2004-01-07T00:00:00Z
                                               # or other smaller interval

observations:
  observers:

  - obs space:
      name: InsituTS
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_TS_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/hofx/3d/wc13_TS_hofx.nc4
      simulated variables: [salinity, waterTemperature]
    obs operator:
      name: VertInterp
      vertical coordinate: unvarying_model_level_depth_at_cell_center
      observation vertical coordinate: depth
      observation alias file: testinput/obsop_name_map.yaml

  - obs space:
      name: InsituTemperature
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_temp_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/hofx/3d/wc13_temp_hofx.nc4
      simulated variables: [waterTemperature]
    obs operator:
      name: VertInterp
      vertical coordinate: unvarying_model_level_depth_at_cell_center
      observation vertical coordinate: depth
      observation alias file: testinput/obsop_name_map.yaml

  - obs space:
      name: InsituSalinity
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_salt_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/hofx/3d/wc13_salt_hofx.nc4
      simulated variables: [salinity]
    obs operator:
      name: VertInterp
      vertical coordinate: unvarying_model_level_depth_at_cell_center
      observation vertical coordinate: depth
      observation alias file: testinput/obsop_name_map.yaml

  - obs space:
      name: SST
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_sst_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/hofx/3d/wc13_sst_hofx.nc4
      simulated variables: [seaSurfaceTemperature]
    obs operator:
      name: Identity
      observation alias file: testinput/obsop_name_map.yaml

  - obs space:
      name: SSS
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_sss_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/hofx/3d/wc13_sss_hofx.nc4
      simulated variables: [seaSurfaceSalinity]
    obs operator:
      name: Identity
      observation alias file: testinput/obsop_name_map.yaml

  - obs space:
      name: ADT
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/wc13/obs/wc13_adt_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/hofx/3d/wc13_adt_hofx.nc4
      simulated variables: [absoluteDynamicTopography]
    obs operator:
      name: ADT

