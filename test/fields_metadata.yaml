# --------------------------------------------------------------------------------------------------
# Field metadata (CF 1.10) for ROMS-JEDI. Each field can contain the following information:
#
# name:                 Variable standard name from convection dictionary
# gtype:                C-grid location: 'r', 'u', or 'v' (Default: 'r')
# masked:               Use land/sea mask if true (Default: true)
# levels:               'surface' or 'full_ocn' levelsAreTopDown=false (Default: 'surface')
# short_name:           Variable short name for internal use
# surface_name:         Variable surface name for extraction
# io_file:              Component file domain 'ocn'
# io_name:              I/O NetCDF file variable name
# units:                Variable units
# property;             Variable properties
# --------------------------------------------------------------------------------------------------

# --------------------------------------------------------------------------------------------------
# Ocean state variables.
# --------------------------------------------------------------------------------------------------

- name:         'sea_water_temperature'
  surface name: 'sea_surface_temperature'
  short name:   'tocn'
  io name:      'temp'
  io file:      'ocn'
  gtype:        'r'
  levels:       'full_ocn'
  units:        'Celsius'

- name:         'sea_water_salinity'
  surface name: 'sea_surface_salinity'
  short name:   'socn'
  io name:      'salt'
  io file:      'ocn'
  gtype:        'r'
  levels:       'full_ocn'
  units:        'nondimensional'
  property:     'positive definite'

- name:         'sea_water_x_velocity'
  surface name: 'sea_water_surface_x_velocity'
  short name:   'uocn'
  io name:      'u'
  io file:      'ocn'
  gtype:        'u'                                          # C-grid
  units:        'meter second-1'
  levels:       'full_ocn'

- name:         'sea_water_y_velocity'
  surface name: 'surface_sea_water_y_velocity'
  short name:   'vocn' 
  io name:      'v'
  io file:      'ocn'
  gtype:        'v'                                          # C-grid
  units:        'meter second-1'
  levels:       'full_ocn'

- name:         'eastward_sea_water_velocity'
  surface name: 'surface_eastward_sea_water_velocity'
  short name:   'uaocn'
  io name:      'u_eastward'
  io file:      'ocn'
  gtype:        'r'                                          # A-grid
  units:        'meter second-1'
  levels:       'full_ocn'

- name:         'northward_sea_water_velocity'
  surface name: 'surface_northward_sea_water_velocity'
  short name:   'vaocn'
  io name:      'v_northward'
  io file:      'ocn'
  gtype:        'r'                                          # A-grid
  units:        'meter second-1'
  levels:       'full_ocn'

- name:         'sea_surface_height_above_geoid'
  surface name: 'sea_surface_height_above_geoid'
  short name:   'ssh'
  io name:      'zeta'
  io file:      'ocn'
  gtype:        'r'
  units:        'meter'

