# --------------------------------------------------------------------------------------------------
# Field metadata (CF 1.10) for ROMS-JEDI. Each field can contain the following information:
#
# name:                 Internal name used by ROMS code and config files
# gtype:                C-grid location: 'r', 'u', or 'v' (Default: 'r')
# masked:               use land/sea mask if true (Default: true)
# levels:               'surface' or 'full_ocn' (Default: 'surface')
# getval_name:          UFO variable name expected by GetValues (Default: <name>)
# getval_name_surface:  UFO GetValues variable name for 2D surface of a 3D field (Default: <unused>)
# io_file:              Component file domain 'ocn' (Default: <unused>)
# io_name:              I/O NetCDF file variable name (Default: <unused>)
# --------------------------------------------------------------------------------------------------


# --------------------------------------------------------------------------------------------------
# Ocean state variables.
# --------------------------------------------------------------------------------------------------

- name: 'tocn'
  gtype: 'r'
  levels: 'full_ocn'
  getval name: 'sea_water_potential_temperature'
  getval name surface: 'sea_surface_temperature'
  io file: 'ocn'
  io name: 'temp'

- name: 'socn'
  gtype: 'r'
  levels: 'full_ocn'
  getval name: 'sea_water_practical_salinity'
  getval name surface: 'sea_surface_salinity'
  io file: 'ocn'
  io name: 'salt'
  property: 'positive_definite'

- name: 'uocn'                                # standard name for UFO/IODA observations is
  gtype: 'u'                                  # 'eastward_sea_water_velocity'
  levels: 'full_ocn'
  getval name: 'eastward_sea_water_velocity'
  getval name surface: 'surface_eastward_sea_water_velocity'
  io file: 'ocn'
  io name: 'u'

- name: 'vocn'                                # standard name for UFO/IODA observations is 
  gtype: 'v'                                  # 'northward_sea_water_velocity'
  levels: 'full_ocn'
  getval name: 'northward_sea_water_velocity'
  getval name surface: 'surface_northward_sea_water_velocity'
  io file: 'ocn'
  io name: 'v'

- name: 'uvel'                                # ROMS grids are usually rotated and native variable
  gtype: 'u'                                  # standard name is 'sea_water_x_velocity'
  levels: 'full_ocn'
  getval name: 'sea_water_x_velocity'
  getval name surface: 'sea_water_surface_x_velocity'
  io file: 'ocn'
  io name: 'u'

- name: 'vvel'                                # ROMS grids are usually rotated and native variable
  gtype: 'v'                                  # standard name is 'sea_water_y_velocity'
  levels: 'full_ocn'
  getval name: 'sea_water_y_velocity'
  getval name surface: 'sea_water_surface_y_velocity'
  io file: 'ocn'
  io name: 'v'

- name: 'ssh'
  gtype: 'r'
  getval name: 'sea_surface_height_above_geoid'
  getval name surface: 'N/A'
  io file: 'ocn'
  io name: 'zeta'

# --------------------------------------------------------------------------------------------------
# Built-in derived variables.
# --------------------------------------------------------------------------------------------------

- name: 'zocn'
  gtype: 'r'
  masked: 'false'
  levels: 'full_ocn'
  getval name: 'model_level_depth_at_cell_center'
  io file: 'ocn'
  io name: 'z_rho'

- name: 'hocn'
  gtype: 'r'
  masked: 'false'
  getval name: 'sea_floor_depth'
  io file: 'ocn'
  io name: 'h'

# --------------------------------------------------------------------------------------------------
# Other ROMS variables that are not included in the state vector. Mostly all of then are needed in
# forward trajectory and are used to linearize the tangent linear and adjoint kernels.
# --------------------------------------------------------------------------------------------------

- name: 'u2docn'
  gtype: 'u'
  getval name: 'barotropic_sea_water_x_velocity'
  io file: 'ocn'
  io name: 'ubar'

- name: 'v2docn'
  gtype: 'v'
  getval name: 'barotropic_sea_water_y_velocity'
  io file: 'ocn'
  io name: 'vbar'

- name: 'DU_avg1'
  gtype: 'u'
  getval name: 'sea_water_time_average_of_barotropic_x_velocity_flux'
  io file: 'ocn'
  io name: 'DU_avg1'

- name: 'DV_avg1'
  gtype: 'v'
  getval name: 'sea_water_time_average_of_barotropic_y_velocity_flux'
  io file: 'ocn'
  io name: 'DV_avg1'

- name: 'DU_avg2'
  gtype: 'u'
  getval name: 'sea_water_correct_barotropic_x_velocity_flux_for_coupling'
  io file: 'ocn'
  io name: 'DU_avg2'

- name: 'DV_avg2'
  gtype: 'v'
  getval name: 'sea_water_correct_barotropic_y_velocity_flux_for_coupling'
  io file: 'ocn'
  io name: 'DV_avg2'

- name: 'Ktocn'
  gtype: 'w'
  levels: 'wfull_ocn'
  getval name: 'vertical_diffusion_coefficient_of_temperature_in_sea_water'
  io file: 'ocn'
  io name: 'AKt'

- name: 'Ksocn'
  gtype: 'w'
  levels: 'wfull_ocn'
  getval name: 'vertical_diffusion_coefficient_of_salinity_in_sea_water'
  io file: 'ocn'
  io name: 'AKs'

- name: 'Kvocn'
  gtype: 'w'
  levels: 'wfull_ocn'
  getval name: 'vertical_viscosity_coefficient_of_sea_wate'
  io file: 'ocn'
  io name: 'AKv'

