# ROMS-JEDI 3D-Var FGAT test: WC13 Application
#
# It uses ROMS 3D state vector and the 4D-Var cost function for a
# 3D-FGAT (First Guess at Appropriate Time) by approximating the
# Tangent Linear and Adjoint models with the Identity operator.
# It computes the analysis increment for the initial state vector
# (beginning of the DA window).
#
# Notice that it does not require ROMS TLM and ADM kernels.
#
# Using DRPLanczos (Derber-Rosati Preconditioned Lanczos).

forecast length: &ForecastLength PT96H           # 96 hours (4 days) window ending on 2004-01-07T00:00:00Z
                                                 # or other smaller interval
model timestep:  &TimeStep PT1800S               # WC13 has a 30 minutes timestep

initial date: &date 2004-01-03T00:00:00Z         # initial DA window
middle date:  &mid_date 2004-01-05T00:00:00Z     # middle  DA window

roms analysis:  &roms_analysis [ssh, uocn, vocn, tocn, socn]
roms state:     &roms_state    [ssh, uocn, vocn, tocn, socn, zocn_r]

cost function:
  cost type: 4D-Var
  window begin: *date
  window length: *ForecastLength
  analysis variables: *roms_analysis 

  geometry: &geom
    project_dir: jediroms_wc13/JEDI/
    roms_stdinp: roms_wc13_20040103.in
    fields metadata: Data/fields_metadata.yaml
    ng: 1                                        # ROMS nested grid number

  model:
    name: ROMS
    model variables: *roms_state
    simulation length: *ForecastLength
    tstep: *TimeStep

  background:
    fields_dir: jediroms_wc13/Data/
    fields_filename: wc13_roms_ini_20040103.nc   # initial fields for 2004-01-03T00:00:00Z
    fields_record: 1
    state variables: *roms_state
    date: *date 

  background error:
    covariance model: SABER
    saber central block:
      saber block name: BUMP_NICAS
      bump:
        drivers:
          multivariate strategy: univariate
          read local nicas: true
        grids:
        - model:
            variables:
            - ssh
          io:
            files prefix: Data/bump/wc13_bump2d
        - model:
            variables:
            - tocn
            - socn
          io:
            files prefix: Data/bump/wc13_bump3d
    saber outer blocks:
    - saber block name: StdDev
      input fields:
      - parameter: StdDev
        file:
          fields_dir: jediroms_wc13/Data/
          fields_filename: wc13_std_i.nc         # same as ROMS native RBL4D-Var
          fields_record: 1
          state variables: *roms_analysis
          date: *date 

  observations:
    obs perturbations: false                     # default
    observers:
    - obs space:
        name: InsituTemperature
        obsdatain:
          engine:
            type: H5File
            obsfile: Data/obs/wc13_temp_20040103.nc4
        obsdataout:
          engine:
            type: H5File
            obsfile: Data/3dvar/fgat/DRPLanczos/wc13_temp_3dvar_fgat.nc4
        simulated variables: [waterTemperature]
      obs operator:
        name: VertInterp
        vertical coordinate: model_level_depth_at_cell_center
        observation vertical coordinate: depth
        observation alias file: testinput/obsop_name_map.yaml
      obs error:
        covariance model: diagonal
 
    - obs space:
        name: InsituSalinity
        obsdatain:
          engine:
            type: H5File
            obsfile: Data/obs/wc13_salt_20040103.nc4
        obsdataout:
         engine:
            type: H5File
            obsfile: Data/3dvar/fgat/DRPLanczos/wc13_salt_3dvar_fgat.nc4
        simulated variables: [salinity]
      obs operator:
        name: VertInterp
        vertical coordinate: model_level_depth_at_cell_center
        observation vertical coordinate: depth
        observation alias file: testinput/obsop_name_map.yaml
      obs error:
        covariance model: diagonal
 
    - obs space:
        name: SST
        obsdatain:
          engine:
            type: H5File
            obsfile: Data/obs/wc13_sst_20040103.nc4
        obsdataout:
          engine:
            type: H5File
            obsfile: Data/3dvar/fgat/DRPLanczos/wc13_sst_3dvar_fgat.nc4
        simulated variables: [seaSurfaceTemperature]
      obs operator:
        name: Identity
        observation alias file: testinput/obsop_name_map.yaml
      obs error:
        covariance model: diagonal

    - obs space:
        name: ADT
        obsdatain:
          engine:
            type: H5File
            obsfile: Data/obs/wc13_adt_20040103.nc4
        obsdataout:
          engine:
            type: H5File
            obsfile: Data/3dvar/fgat/DRPLanczos/wc13_adt_3dvar_fgat.nc4
        simulated variables: [absoluteDynamicTopography]
      obs operator:
        name: ADT
      obs error:
        covariance model: diagonal

variational:
  minimizer:
    algorithm: DRPLanczos
    online diagnostics:
      max eigenvectors: 5
      eigenvector:
        single_record: true
        data_dir: Data/3dvar/fgat/DRPLanczos
        prefix: wc13_roms
        exp: 3dvar_eigenvecs
        type: krylov
        date: *date
  iterations:                                    # each item defines an outer loop
  - ninner: 10
    gradient norm reduction: 1.0e-10
    geometry: *geom
    linear model:
      name: Identity                             # Identity TLM/ADM
      tstep: PT6H
      increment variables: *roms_analysis
      variable change: Identity
    diagnostics:                                 # Written into output IODA files
      departures: ombg                           # OBS - H(Xb)
    online diagnostics:
      write increment: true
      increment:                                 # DA increment output file
        single_record: true
        data_dir: Data/3dvar/fgat/DRPLanczos
        prefix: wc13_roms
        exp: 3dvar
        type: inc
        date: *date

final:                                           # Written into output IODA files
  diagnostics:
    departures: oman                             # saving OBS - H(Xa) in output file

output:
  file_policy: PT98H                             # single output file with 49 records
  frequency: &frequency PT2H                     # write output data every 2 hours
  data_frequency: *frequency
  data_dir: Data/3dvar/fgat/DRPLanczos
  prefix: wc13_roms
  exp: 3dvar
  type: fgat
  date: *date

