# ROMS is configured with the JEDI driver and includes the NLM, TLM, and ADM kernels
# for the US West Coast WC13 test application.
#
# 4D Hofx  unit test for the period of Jan 3-7, 2004
#   We either use an initial state for Jan 3, 2004

geometry:
  project_dir: jediroms_wc13/JEDI/
  roms_stdinp: roms_wc13_20040103.in
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                        # ROMS nested grid number

forecast length: &ForecastLength PT96H         # 96 hours (4 days) window ending on 2004-01-07T00:00:00Z
                                               # or other smaller interval

model:
  name: ROMS
  model variables: [ssh, uocn, vocn, tocn, socn]
  tstep: PT1800S                               # WC13 has a 30 minutes timestep
  simulation length: *ForecastLength

initial condition:
  fields_dir: jediroms_wc13/Data/
  fields_filename: wc13_roms_ini_20040103.nc   # initial fields for 2004-01-03T00:00:00Z
  fields_record: 1
  state variables: [ssh, uocn, vocn, tocn, socn]
  date: 2004-01-03T00:00:00Z

window begin: 2004-01-03T00:00:00Z
window length: *ForecastLength

observations:
  - obs space:
      name: ADT
      obsdataout:
        obsfile: Data/hofx/wc13_adt_hofx.nc
      obsdatain:
        obsfile: Data/obs/wc13_adt_20040103.nc4
      simulated variables: [absolute_dynamic_topography]
    obs operator:
      name: ADT

  - obs space:
      name: SeaSurfaceTemp
      obsdataout:
        obsfile: Data/hofx/wc13_sst_hofx.nc
      obsdatain:
        obsfile: Data/obs/wc13_sst_20040103.nc4
      simulated variables: [sea_surface_temperature]
    obs operator:
      name: Identity

  - obs space:
      name: SeaSurfaceSalinity
      obsdataout:
        obsfile: Data/hofx/wc13_sss_hofx.nc
      obsdatain:
        obsfile: Data/obs/wc13_sss_20040103.nc4
      simulated variables: [sea_surface_salinity]
    obs operator:
      name: Identity

  - obs space:
      name: SurfaceU
      obsdataout:
        obsfile: Data/hofx/wc13_usur_hofx.nc
      obsdatain:
        obsfile: Data/obs/wc13_usur_20040103.nc4
      simulated variables: [surface_eastward_sea_water_velocity]
    obs operator:
      name: Identity

  - obs space:
      name: SurfaceV
      obsdataout:
        obsfile: Data/hofx/wc13_vsur_hofx.nc
      obsdatain:
        obsfile: Data/obs/wc13_vsur_20040103.nc4
      simulated variables: [surface_northward_sea_water_velocity]
    obs operator:
      name: Identity

