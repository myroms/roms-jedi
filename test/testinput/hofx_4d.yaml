# NOTES:
#
# * The WC13 application is configured to run for 96 hours (4-days).
#   However,  it is possible to use a smaller interval for the
#   'forecast length' provided that it is an integer multiple the
#   timestep (1800 s). Then, ROMS internal parameters are changed
#   to the desired interval via the 'simulation length' property.
