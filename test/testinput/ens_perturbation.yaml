# ROMS-JEDI Ensemble Perturbation Test: WC13 Application
#
# It generates Ensemble Perturbations initial conditions and
# run WC13 nonlinear solutions for 4 days.  The ensemble member
# have th suffix pattern %mem% ("_men001", ..., "_memXXX") in
# their output history files.

geometry:
  project_dir: jediroms_wc13/JEDI/
  roms_stdinp: roms_wc13_20040103.in
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                        # ROMS nested grid number

forecast length: &ForecastLength PT96H         # 96 hours (4 days) window ending on 2004-01-07T00:00:00Z
                                               # or other smaller interval
members: 10

perturbed variables: [ssh, tocn, socn]

model:
  name: ROMS
  model variables: &roms_state [ssh, uocn, vocn, tocn, socn]
  tstep: PT1800S
  simulation length: *ForecastLength

initial condition:
  fields_dir: jediroms_wc13/Data/
  fields_filename: wc13_roms_ini_20040103.nc   # initial fields for 2004-01-03T00:00:00Z
  fields_record: 1
  state variables: *roms_state
  date: &date 2004-01-03T00:00:00Z

background error:
  covariance model: SABER
  saber central block:
    saber block name: BUMP_NICAS
    read:
      drivers:
        multivariate strategy: univariate
        read local nicas: true
      grids:
      - model:
          variables:
          - ssh
        io:
          files prefix: Data/bump/wc13_bump2d
      - model:
          variables:
          - tocn
          - socn
        io:
          files prefix: Data/bump/wc13_bump3d
  saber outer blocks:
  - saber block name: StdDev
    read:
      model file:
        fields_dir: jediroms_wc13/Data/
        fields_filename: wc13_std_i.nc         # same as ROMS native RBL4D-Var
        fields_record: 1
        state variables: *roms_state
        date: *date

# Output filenames are: "wc13_roms_ensemble_memXXX_YYYY-MM-DD-hh.mm.ss.nc"

output:
  file_policy: PT98H                           # single output file with 49 records
  frequency: &frequency PT2H                   # write output data every 2 hours
  data_frequency: *frequency
  data_dir: Data/ensembles
  prefix: wc13_roms
  exp: ensemble
  type: mem                                    # enseble filename suffix
  date: *date                                  # alias to initial date
  forecast length: *ForecastLength             # alias to forecast length

test:
  reference filename: testref/ens_perturbation.ref
  float relative tolerance: 1.0e-6
  log output filename: testoutput/ens_perturbation.log
  test output filename: testoutput/ens_perturbation.out
