  - obs space:
      name: Simulate
      generate:
        random:
          nobs: 100
          lat1: 30.0
          lat2: 48.0
          lon1: -134.0
          lon2: -116.0
          random seed: 452938
        obs errors: [1.0, 1.0]
      obsdataout:
        obsfile: Data/makeobs/wc13_truth_sur_uv.nc4
      simulated variables: [surface_eastward_sea_water_velocity,
                            surface_northward_sea_water_velocity]
    obs operator:
      name: Identity

