# ROMS is configured with the JEDI driver and includes the NLM, TLM, and ADM kernels
# for the US West Coast WC13 test application.

geometry:
  project_dir: jediroms_wc13/JEDI/
  roms_stdinp: roms_wc13_20040103.in
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                        # ROMS nested grid number

forecast length: &ForecastLength P4D           # 4-days window ending on 2004-01-07T00:00:00Z
                                               # or other smaller interval

model:
  name: ROMS
  model variables: [ssh, uocn, vocn, tocn, socn]
  tstep: PT1800S                               # WC13 has a 30 minutes timestep
  simulation length: *ForecastLength

initial condition:
  date: 2004-01-03T00:00:00Z
  fields_dir: jediroms_wc13/Data/
  fields_filename: wc13_roms_ini_20040103.nc   # initial fields for 2004-01-03T00:00:00Z
  fields_record: 1
  state variables: [ssh, uocn, vocn, tocn, socn, z0ocn_r]

window begin: 2004-01-03T00:00:00Z
window length: *ForecastLength

observations:
  obs perturbations: true

  observers:

  - obs space:
      name: InsituTS
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/obs/wc13_TS_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/makeobs/wc13_perturb_TS.nc4
      simulated variables: [salinity, waterTemperature]
      observed variables:  [salinity, waterTemperature]
    obs operator:
      name: VertInterp
      vertical coordinate: unvarying_model_level_depth_at_cell_center
      observation vertical coordinate: depth
      observation alias file: testinput/obsop_name_map.yaml
    obs error:
      covariance model: diagonal

  - obs space:
      name: InsituTemperature
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/obs/wc13_temp_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/makeobs/wc13_perturb_temp.nc4
      simulated variables: [waterTemperature]
      observed variables:  [waterTemperature]
    obs operator:
      name: VertInterp
      vertical coordinate: unvarying_model_level_depth_at_cell_center
      observation vertical coordinate: depth
      observation alias file: testinput/obsop_name_map.yaml
    obs error:
      covariance model: diagonal

  - obs space:
      name: InsituSalinity
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/obs/wc13_salt_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/makeobs/wc13_perturb_salt.nc4
      simulated variables: [salinity]
      observed variables:  [salinity]
    obs operator:
      name: VertInterp
      vertical coordinate: unvarying_model_level_depth_at_cell_center
      observation vertical coordinate: depth
      observation alias file: testinput/obsop_name_map.yaml
    obs error:
      covariance model: diagonal

  - obs space:
      name: SST
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/obs/wc13_sst_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/makeobs/wc13_perturb_sst.nc4
      simulated variables: [seaSurfaceTemperature]
      observed variables:  [seaSurfaceTemperature]
    obs operator:
      name: Identity
      observation alias file: testinput/obsop_name_map.yaml
    obs error:
      covariance model: diagonal

  - obs space:
      name: SSS
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/obs/wc13_sss_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/makeobs/wc13_perturb_sss.nc4
      simulated variables: [seaSurfaceSalinity]
      observed variables:  [seaSurfaceSalinity]
    obs operator:
      name: Identity
      observation alias file: testinput/obsop_name_map.yaml
    obs error:
      covariance model: diagonal

  - obs space:
      name: ADT
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/obs/wc13_adt_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/makeobs/wc13_perturb_adt.nc4
      simulated variables: [absoluteDynamicTopography]
      observed variables:  [absoluteDynamicTopography]
    obs operator:
      name: ADT
    obs error:
      covariance model: diagonal

  - obs space:
      name: SurfaceUV
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/obs/wc13_uv_sur_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/makeobs/wc13_perturb_uv_sur.nc4
      simulated variables: [waterSurfaceZonalVelocity,
                            waterSurfaceMeridionalVelocity]
      observed variables:  [waterSurfaceZonalVelocity,
                            waterSurfaceMeridionalVelocity]
    obs operator:
      name: Identity
      observation alias file: testinput/obsop_name_map.yaml
    obs error:
      covariance model: diagonal

  - obs space:
      name: SurfaceU
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/obs/wc13_usur_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/makeobs/wc13_perturb_usur.nc4
      simulated variables: [waterSurfaceZonalVelocity]
      observed variables:  [waterSurfaceZonalVelocity]
    obs operator:
      name: Identity
      observation alias file: testinput/obsop_name_map.yaml
    obs error:
      covariance model: diagonal

  - obs space:
      name: SurfaceV
      obsdatain:
        engine:
          type: H5File
          obsfile: Data/obs/wc13_vsur_20040103.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: Data/makeobs/wc13_perturb_vsur.nc4
      simulated variables: [waterSurfaceMeridionalVelocity]
      observed variables:  [waterSurfaceMeridionalVelocity]
    obs operator:
      name: Identity
      observation alias file: testinput/obsop_name_map.yaml
    obs error:
      covariance model: diagonal

