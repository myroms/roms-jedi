make obs: true

test:
  reference filename: testref/makeobs_4d_perturbed.ref
  float relative tolerance: 1.0e-6
  log output filename: testoutput/makeobs_4d_perturbed.log
  test output filename: testoutput/makeobs_4d_perturbed.out

# NOTES:
#
# * Check IODA ObsSpace YAML file for metadata naming conventions:
#
#   JCSDA repository: ioda/share/ioda/yaml/validation/ObsSpace.yaml
#   https://github.com/JCSDA-internal/ioda/blob/develop/share/ioda/yaml/validation/ObsSpace.yaml
#
# * The WC13 application is configured to run for 96 hours (4-days).
#   However,  it is possible to use a smaller interval for the
#   'forecast length' provided that it is an integer multiple the
#   timestep (1800 s). Then, ROMS internal parameters are changed
#   to the desired interval via the 'simulation length' property.
