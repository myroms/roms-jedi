# ROMS is configured with the JEDI driver and includes the NLM, TLM, and ADM kernels
# for the US West Coast WC13 test application.

geometry:
  project_dir: jediroms_wc13/JEDI/
  roms_stdinp: roms_wc13_20040103.in
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                        # ROMS nested grid number

model:
  name: ROMS
  model variables: [ssh, uocn, vocn, tocn, socn]
  tstep: PT1800S                               # WC13 has a 30 minutes timestep

initial condition:
  fields_dir: jediroms_wc13/Data/
  fields_filename: wc13_roms_ini_20040103.nc   # initial fields for 2004-01-03T00:00:00Z
  fields_record: 1
  state variables: [ssh, uocn, vocn, tocn, socn]
  date: 2004-01-03T00:00:00Z

window begin: 2004-01-03T00:00:00Z
window length: P4D                             # 4 days window ending on 2004-01-07T00:00:00Z
forecast length: P4D

observations:
  - obs space:
      name: ADT
      obsdataout:
        obsfile: Data/Obs/wc13_truth_adt.nc4
      obsdatain:
        obsfile: Data/Obs/wc13_adt_20040103.nc4
      simulated variables: [obs_absolute_dynamic_topography]
    obs operator:
      name: ADT
    obs error:
      covariance model: diagonal

  - obs space:
      name: SeaSurfaceTemp
      obsdataout:
        obsfile: Data/Obs/wc13_truth_sst.nc4
      obsdatain:
        obsfile: Data/Obs/wc13_sst_20040103.nc4
      simulated variables: [sea_surface_temperature]
    obs operator:
      name: Identity
    obs error:
      covariance model: diagonal

  - obs space:
      name: Simulate
      generate:
        random:
          nobs: 100
          lat1: 30.0
          lat2: 48.0
          lon1: -134.0
          lon2: -116.0
          random seed: 452938
        obs errors: [1.0]
      obsdataout:
        obsfile: Data/Obs/wc13_truth_sss.nc4
      simulated variables: [sea_surface_salinity]
    obs operator:
      name: Identity

  - obs space:
      name: InsituTemperature
      obsdataout:
        obsfile: Data/Obs/wc13_truth_ptemp.nc4
      obsdatain:
        obsfile: Data/Obs/wc13_temp_20040103.nc4
      simulated variables: [sea_water_potential_temperature]
    obs operator:
      name: Identity
    obs error:
      covariance model: diagonal

  - obs space:
      name: InsituSalinity
      obsdataout:
        obsfile: Data/Obs/wc13_truth_salt.nc4
      obsdatain:
        obsfile: Data/Obs/wc13_salt_20040103.nc4
      simulated variables: [sea_water_practical_salinity]
    obs operator:
      name: Identity
    obs error:
      covariance model: diagonal

  - obs space:
      name: Simulate
      generate:
        random:
          nobs: 100
          lat1: 30.0
          lat2: 48.0
          lon1: -134.0
          lon2: -116.0
          random seed: 452938
        obs errors: [1.0, 1.0]
      obsdataout:
        obsfile: Data/Obs/wc13_truth_sur_uv.nc4
      simulated variables: [surface_sea_water_zonal_velocity,
                            surface_sea_water_meridional_velocity]
    obs operator:
      name: Identity

  - obs space:
      name: Simulate
      generate:
        random:
          nobs: 100
          lat1: 30.0
          lat2: 48.0
          lon1: -134.0
          lon2: -116.0
          random seed: 452938
        obs errors: [1.0, 1.0]
      obsdataout:
        obsfile: Data/Obs/wc13_truth_uv.nc4
      simulated variables: [sea_water_zonal_velocity,
                            sea_water_meridional_velocity]
    obs operator:
      name: Identity

make obs: true
obs perturbations: true
