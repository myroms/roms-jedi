# ROMS is configured with the JEDI driver and includes the NLM, TLM, and ADM kernels
# for the US West Coast WC13 test application.
#
# 3D Hofx NoModel unit test for the period of Jan 3-7, 2004
#   We either use an initial state for Jan 3, 2004 or 
#      the nonlinear model (NLM) trajectory for Jan 3-7, 2004 with fields every two hours

geometry:
  project_dir: jediroms_wc13/JEDI/
  roms_stdinp: roms_wc13_20040103.in
  fields metadata: Data/fields_metadata.yaml
  ng: 1                                        # ROMS nested grid number

state:
  fields_dir: jediroms_wc13/Data/
  fields_filename: wc13_roms_ini_20040103.nc   # initial fields for 2004-01-03T00:00:00Z
  fields_record: 1                             # assign middle window time of 2004-01-05T00:00:00Z
# fields_filename: wc13_NLtrajectory_sp.nc     # single precision NLM trajectory (2 hours snapshots)
# fields_filename: wc13_NLtrajectory_dp.nc     # double precision NLM trajectory (2 hours snapshots)
# fields_record: 26                            # record for middle of time window on 2004-01-05T00:00:00Z
  date: 2004-01-05T00:00:00Z
  state variables: [ssh, tocn, socn]
# state variables: [tocn]

window begin: 2004-01-03T00:00:00Z
window length: P4D                             # 4 days window ending on 2004-01-07T00:00:00Z

observations:
  - obs space:
      name: ADT
      obsdataout:
        obsfile: Data/Obs/wc13_adt_hofx.nc
      obsdatain:
        obsfile: Data/Obs/wc13_adt_20040103.nc4
      simulated variables: [obs_absolute_dynamic_topography]
    obs operator:
      name: ADT

  - obs space:
      name: SeaSurfaceTemp
      obsdataout:
        obsfile: Data/Obs/wc13_sst_hofx.nc
      obsdatain:
        obsfile: Data/Obs/wc13_sst_20040103.nc4
      simulated variables: [sea_surface_temperature]
    obs operator:
      name: Identity

